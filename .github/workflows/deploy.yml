# .github/workflows/deploy.yml

name: Build and Deploy

# When does this pipeline run?
on:
  push:
    branches: [ main ]        # runs on every push to main branch
  pull_request:
    branches: [ main ]        # also runs on pull requests

jobs:

  # ── JOB 1: Run Tests ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest    # GitHub provides a free Ubuntu machine

    steps:
      # Step 1: Download your code onto GitHub's machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: Cache Maven dependencies
      # So it doesn't re-download everything on every run
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      # Step 4: Run the tests
      - name: Run tests
        run: mvn test

  # ── JOB 2: Build and Push Docker Image ────────────────────────────
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test               # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Log in to Docker Hub using secrets (set these in GitHub)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Build and push the image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # Image name: yourusername/remote-desktop-server:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/remote-desktop-server:latest